steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file
      - deployment/docker/frontend.Dockerfile
      - --build-arg
      - VITE_API_BASE_URL=${_API_BASE_URL}
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/retail-intelligence-web:${_TAG}
      - .

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/retail-intelligence-web:${_TAG}

substitutions:
  _REGION: us-central1
  _REPOSITORY: retail-intelligence
  _TAG: manual
  _API_BASE_URL: https://api.invalid.example
